<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Refine Loop · run</title>
<style>
  :root{
    --bg:#0d1117; --panel:#151b24; --panel-2:#1b232e; --line:#263041;
    --ink:#e6edf3; --muted:#9aa7b6; --dim:#6b7888;
    --hot:#ff5c4d; --warm:#ffa23a; --cool:#3fb6a8; --zero:#46d39a;
    --accent:#6ea8fe; --human:#c08cff;
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.5;
       -webkit-font-smoothing:antialiased;padding:clamp(16px,4vw,40px)}
  .wrap{max-width:1040px;margin:0 auto}
  h1{font-size:clamp(20px,3.4vw,30px);margin:0 0 2px;letter-spacing:-.02em}
  h2{font-size:13px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin:0 0 14px;
     font-weight:600;display:flex;align-items:center;gap:7px}
  .sub{color:var(--dim);font-size:14px;margin:0}
  .mono{font-family:var(--mono)}
  header{display:flex;flex-wrap:wrap;gap:16px;align-items:baseline;justify-content:space-between;
         padding-bottom:20px;border-bottom:1px solid var(--line);margin-bottom:24px}
  .badge{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:13px;
         font-weight:600;padding:6px 12px;border-radius:999px;background:rgba(70,211,154,.12);
         color:var(--zero);border:1px solid rgba(70,211,154,.3);cursor:help}
  .badge .dot{width:8px;height:8px;border-radius:50%;background:var(--zero)}
  .badge.human{background:rgba(192,140,255,.12);color:var(--human);border-color:rgba(192,140,255,.3)}
  .badge.human .dot{background:var(--human)}
  .badge.active{background:rgba(255,162,58,.12);color:var(--warm);border-color:rgba(255,162,58,.3)}
  .badge.active .dot{background:var(--warm)}
  .badge.quiet{background:var(--panel-2);color:var(--muted);border-color:var(--line)}
  .badge.quiet .dot{background:var(--dim)}
  .badges{display:flex;gap:8px;flex-wrap:wrap}
  .grid{display:grid;grid-template-columns:repeat(12,1fr);gap:16px}
  .grid>*,.grid .panel{min-width:0}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px}
  .col-12{grid-column:span 12}.col-8{grid-column:span 8}.col-6{grid-column:span 6}.col-4{grid-column:span 4}
  @media(max-width:760px){.col-8,.col-6,.col-4{grid-column:span 12}}
  .hero{display:flex;align-items:flex-end;gap:24px;flex-wrap:wrap}
  .bignum{font-family:var(--mono);font-size:clamp(48px,9vw,76px);font-weight:700;line-height:.9}
  .hero .label{color:var(--muted);font-size:14px;max-width:32ch}
  .trail{font-family:var(--mono);font-size:15px;color:var(--muted);margin-top:6px}
  .trail b{color:var(--ink)}
  svg{display:block;width:100%;height:auto;overflow:visible}
  .axis{stroke:var(--line);stroke-width:1}
  .gridline{stroke:var(--line);stroke-width:1;stroke-dasharray:2 4;opacity:.6}
  .tick{fill:var(--dim);font-family:var(--mono);font-size:11px}
  .barlbl{fill:var(--ink);font-family:var(--mono);font-size:13px;font-weight:600}
  .barcap{fill:var(--dim);font-family:var(--mono);font-size:10.5px}
  .round{display:flex;gap:14px;padding:12px 0;border-top:1px solid var(--line)}
  .round:first-child{border-top:0}
  .rnum{font-family:var(--mono);font-size:13px;color:var(--dim);min-width:30px;padding-top:2px}
  .rbody{flex:1;min-width:0}
  .kinds{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px}
  .kind{font-family:var(--mono);font-size:11px;padding:2px 8px;border-radius:6px;background:var(--panel-2);
        color:var(--muted);border:1px solid var(--line);cursor:help}
  .kind.adv{color:var(--warm);border-color:rgba(255,162,58,.3)}
  .kind.build{color:var(--accent);border-color:rgba(110,168,254,.3)}
  .kind.converge{color:var(--zero);border-color:rgba(70,211,154,.3)}
  .kind.graduate,.kind.deploy{color:var(--human);border-color:rgba(192,140,255,.3)}
  .rtext{font-size:13.5px;color:var(--muted)} .rtext .res{color:var(--ink);font-weight:600}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th{text-align:left;color:var(--dim);font-weight:600;font-size:11px;text-transform:uppercase;
     letter-spacing:.08em;padding:0 0 8px;border-bottom:1px solid var(--line)}
  td{padding:10px 0;border-bottom:1px solid var(--line);vertical-align:top}
  td:first-child{font-family:var(--mono);color:var(--accent);white-space:nowrap;padding-right:14px}
  tr:last-child td{border-bottom:0}
  .st{font-family:var(--mono);font-size:11px;padding:2px 8px;border-radius:6px;white-space:nowrap}
  .st.met{background:rgba(70,211,154,.12);color:var(--zero)}
  .st.grown{background:rgba(110,168,254,.12);color:var(--accent)}
  .st.open{background:rgba(255,162,58,.12);color:var(--warm)}
  ul.clean{list-style:none;margin:0;padding:0}
  ul.clean li{padding:8px 0 8px 22px;position:relative;font-size:13.5px;color:var(--muted);border-top:1px solid var(--line)}
  ul.clean li:first-child{border-top:0}
  ul.clean li::before{position:absolute;left:0;top:8px;font-family:var(--mono)}
  li.pass::before{content:"✓";color:var(--zero)} li.carry::before{content:"○";color:var(--warm)}
  li b{color:var(--ink);font-weight:600}
  .effort{display:flex;gap:28px;flex-wrap:wrap}
  .effort .n{font-family:var(--mono);font-size:30px;font-weight:700;color:var(--ink);line-height:1}
  .effort .k{color:var(--dim);font-size:12px;margin-top:4px}
  .note{color:var(--dim);font-size:12px;margin-top:14px;font-style:italic}
  .empty{color:var(--dim);font-size:14px;text-align:center;padding:40px}
  .emptywrap{max-width:440px;margin:22vh auto 0;text-align:center;padding:44px 32px}
  .emptywrap h1{margin-bottom:8px}
  .pulse{display:block;width:10px;height:10px;border-radius:50%;background:var(--accent);
         margin:0 auto 20px;animation:pulse 2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}
  @media(prefers-reduced-motion:reduce){.pulse{animation:none;opacity:.7}}
  .scrollx{overflow-x:auto}
  .outcome{border-left:3px solid var(--accent)}
  .o-kick{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.1em;
          color:var(--dim);margin-bottom:6px}
  .o-head{font-size:clamp(18px,3vw,26px);font-weight:700;letter-spacing:-.015em;line-height:1.25;
          margin:0 0 6px;max-width:60ch}
  .o-detail{color:var(--muted);font-size:14px;max-width:72ch;margin:0 0 16px}
  .o-next{display:flex;gap:12px;align-items:baseline;flex-wrap:wrap;font-size:14px;color:var(--muted);
          padding:13px 16px;border-radius:10px;background:var(--panel-2);border:1px solid var(--line)}
  .o-next .who{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.08em;
               font-weight:700;white-space:nowrap;color:var(--accent)}
  .o-next .act{color:var(--ink)}
  .outcome.done{border-left-color:var(--zero)}
  .outcome.done .o-next{background:rgba(70,211,154,.08);border-color:rgba(70,211,154,.3)}
  .outcome.done .o-next .who{color:var(--zero)}
  .outcome.human{border-left-color:var(--human)}
  .outcome.human .o-next{background:rgba(192,140,255,.1);border-color:rgba(192,140,255,.4);
                         font-size:15px;padding:15px 18px}
  .outcome.human .o-next .who{color:var(--human)}
  footer{color:var(--dim);font-size:12px;margin-top:28px;padding-top:16px;border-top:1px solid var(--line);
         display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}
  .src{font-family:var(--mono)}
  .info{appearance:none;background:none;border:1px solid var(--line);color:var(--dim);width:16px;height:16px;
        border-radius:50%;font-size:10px;line-height:1;cursor:help;padding:0;display:inline-flex;
        align-items:center;justify-content:center;flex:none}
  .info:hover,.info:focus-visible{border-color:var(--accent);color:var(--accent);outline:none}
  .term{border-bottom:1px dotted var(--dim);cursor:help}
  .helphint{font-size:12px;color:var(--dim);margin:6px 0 0}
  #tooltip{position:fixed;z-index:50;max-width:280px;background:#0a0e14;color:var(--ink);
           border:1px solid var(--accent);border-radius:10px;padding:11px 13px;font-size:13px;line-height:1.45;
           box-shadow:0 8px 28px rgba(0,0,0,.55);pointer-events:none;opacity:0;transform:translateY(4px);
           transition:opacity .12s,transform .12s;text-transform:none;letter-spacing:normal;font-weight:400}
  #tooltip.show{opacity:1;transform:translateY(0)} #tooltip b{color:var(--accent)}
  @media(prefers-reduced-motion:reduce){#tooltip{transition:none}}
</style>
</head>
<body>
<div class="wrap" id="root"></div>
<div id="tooltip" role="tooltip"></div>

<script>
/* ====== RUN DATA — inline slot for the terminal single-file render (see schema.md) == */
const RUN_INLINE = /*__RUN__*/ {
  title: "FAVO — PRD executed to perfection + code & security checks",
  status: "graduated",
  human_blessed: true,
  stamp: "Graduated · R8 · 2026-07-04 · merged + post-merge verified",
  budget: { max_rounds: 8, used: 8, note: "budget cap 8/8 at evidence saturation. R8 verified the merge on main (909 unit green) + live production; residual is live-operation measurement only" },
  outcome: {
    headline: "Graduated + post-merge verified: PR #208 merged, main re-checked green, run closed at budget cap (8/8)",
    detail: "The convergence recommendation was blessed and EXECUTED. During graduation the strongest adversary of the run — code owner Gian, reviewing against the LIVE production database the static critics never had — falsified the R5 'converged' call with 4 blocking findings. Chief among them (B1): the earlier fix moved loyalty earn to the Yoco-webhook-only path, but live data shows 64/66 payments never touch Yoco (the café tenders manually), so earning would have STOPPED in production. Fixed on commit 0e8df92: confirmManualPayment (manual cash/card-machine/EFT tender that persists + earns idempotently), reverseOrderLoyalty (clamped/audited, on cancel + refund), the tests/db prod-mutation guard, the missing accrual audit, and 5 should-fixes incl. migration 0025's TRUNCATE guard. 905/905 unit green, full CI green (incl. test:db against real Postgres), PR #208 merged (squash 43125cc), migrations 0020–0025 applied to live. The decisive learning: the automated adversaries were correctly grounded but static-only in reach; a human checking live data caught what they structurally could not."
  },
  next: { who: "human", act: "Code, CI, DB and merge residuals are ALL closed, shipped, and post-merge verified on main + production. The only open items are live-OPERATION measurements no dev machine can produce: SC01 place a live test order → admin COGS updates ≤5s; SC05 tap a real phone → push arrives ≤10s; SC08 kill Wi-Fi on the POS tablet, place 3–5 orders, reconnect → 0 lost; SC02 run the k6 runbook (docs/load-testing-sunday-peak.md), 45 orders/85 min; SC03/04 read v_order_fulfillment_percentiles once REAL café data exists (today's numbers are test/seed → degenerate). Housekeeping: rotate the live Supabase DB password (pasted into a session transcript during graduation)." },
  rounds: [
    { n: 0, kind: ["setup"], text: "Located canonical repo, read PRD v4, captured baseline (CI green, 884/884), enumerated 33 criteria. Scope=static+live, budget=8.", res: "ready", blocking: null },
    { n: 1, kind: ["adversarial"], text: "4 blind adversaries attacked PRD conformance. 11 blocking findings, 0 new criteria. Triple-independent convergence on F1 (append-only/RLS never applied). RBAC/secrets/HMAC/clamp/wallet-caps/CI confirmed solid.", res: "not converged", blocking: 11 },
    { n: 2, kind: ["build", "verify"], text: "Built all 11 fixes (2 bg agents + driver). typecheck ✓, lint ✓, 892/892 unit.", res: "11 fixed", blocking: null },
    { n: 3, kind: ["adversarial", "verify"], text: "2 fresh delta adversaries. DB/RLS: CONVERGED (corrected the driver — the uuid-cast I 'fixed' was a false alarm, columns are text). App-logic: found 1 real blocking regression (F6-1: deferred-payment orders earn 0 points) + F9-1 (audit entity_kind mismatch).", res: "not converged", blocking: 1 },
    { n: 4, kind: ["build", "verify"], text: "Fixed F6-1 (shared idempotent accrueOrderLoyalty called from webhook + deferred cron) + F9-1 (entity_kind 'order'). typecheck ✓, lint ✓, 893/893 unit (+1 deferred-earn regression test).", res: "2 fixed", blocking: null },
    { n: 5, kind: ["adversarial", "verify", "converge"], text: "Fresh money-path adversary: exactly-once earning across both confirmation sites, earn removed from state transition, no site missed, regression sweep clean, 30/30 tests. Zero blocking, no new criterion → recommendation. Then human-directed graduation: committed to branch, opened PR #208, CI green (test:db + Semgrep fixes pushed).", res: "CONVERGED → recommend", blocking: 0 },
    { n: 6, kind: ["adversarial"], text: "STRONGEST adversary of the run: code owner Gian reviews PR #208 against the LIVE prod DB the static critics lacked. Falsifies 'converged' — 4 blocking + 6 should-fixes. B1: webhook-only earn would KILL loyalty in prod (64/66 payments never touch Yoco; re-verified live). B2: tests/db could mutate prod. B4: accrueOrderLoyalty unaudited. B3 already fixed. +criterion CK07.", res: "not converged", blocking: 4 },
    { n: 7, kind: ["build", "verify", "graduate"], text: "Fixed all valid findings (commit 0e8df92): confirmManualPayment + POS button, reverseOrderLoyalty (clamped, on cancel+refund), tests/db prod guard, accrual audit, migration 0025 TRUNCATE guard, 23514→CONFLICT, entity_kind, refunds return, weekly-pnl expenses. +12 unit tests. 905/905 unit ✓, full CI green (test:db vs real Postgres). PR #208 MERGED (squash 43125cc); migrations 0020–0025 applied live.", res: "GRADUATED", blocking: 0 },
    { n: 8, kind: ["verify", "budget_cap"], text: "Post-merge scoped verification (budget cap). Pulled main @43125cc; a fresh adversary confirmed the squash is clean (nothing dropped; #205/#207 coexist, one def each of checkRecipeStock + confirmManualPayment). Re-ran the gate ON MAIN: typecheck ✓, lint ✓, 909/909 unit ✓. Vercel prod deploy success + /api/healthz 200 (postgres+yoco ok). Self-correction: SC03/04 were marked met prematurely — the view ships correctly but live percentiles are degenerate test/seed data, so the targets rejoin the live-measurement residual. Budget 8/8 → run closed at evidence saturation.", res: "VERIFIED · CLOSED", blocking: 0 }
  ],
  rules: [
    { id: "SC01", t: "Live COGS expenses fixed (≤5s = live drill)", s: "met" },
    { id: "SC02", t: "Sunday peak 45/85min — runbook shipped, run is live", s: "open" },
    { id: "SC03", t: "Order-to-cup p50 ≤5m — view shipped; target needs REAL data (seed=degenerate)", s: "open" },
    { id: "SC04", t: "Order-to-cup p95 ≤10m — view shipped; target needs a real Sunday peak", s: "open" },
    { id: "SC05", t: "Push ≤10s — live device drill", s: "open" },
    { id: "SC06", t: "Loyalty 5pts/R10 auto — now fires on the MANUAL pay path too (B1)", s: "met" },
    { id: "SC07", t: "Weekly variance view fixed", s: "met" },
    { id: "SC08", t: "Offline 0-lost — code sound; drill manual", s: "open" },
    { id: "SC09", t: "Audit coverage query fixed (col + entity_kind)", s: "met" },
    { id: "SC10", t: "Staff entitlement 1/weekday", s: "met" },
    { id: "SC11", t: "Monthly P&L needs admin_sig", s: "met" },
    { id: "BR01", t: "L01 No payment, no order", s: "met" },
    { id: "BR02", t: "L02 No refunds — returns {ok:false}, not throw", s: "met" },
    { id: "BR03", t: "L03 Staff coffee = category", s: "met" },
    { id: "BR04", t: "L04 Hours display-only", s: "met" },
    { id: "BR05", t: "L05 Customer read-only + RLS", s: "met" },
    { id: "BR06", t: "L06 Earn→payment-confirm (webhook+cron+manual) + reversal + CHECK", s: "met" },
    { id: "BR07", t: "L07 Midnight boundary", s: "met" },
    { id: "BR08", t: "L08 Inventory-adj + loyalty-earn now audited", s: "met" },
    { id: "BR09", t: "L09 closeDaily pages, no hard block — N7", s: "open" },
    { id: "BR10", t: "L10 Emergency purchase pending-flow — N8", s: "open" },
    { id: "BR11", t: "L11 Monthly P&L sign-off", s: "met" },
    { id: "BR12", t: "L12 Audit append-only — UPDATE/DELETE + TRUNCATE (0025)", s: "met" },
    { id: "BR13", t: "L13 RLS wired + CI-verified vs real PG", s: "met" },
    { id: "BR14", t: "L14 Entitlement DB UNIQUE+weekday", s: "met" },
    { id: "BR15", t: "L15 Done most prominent", s: "met" },
    { id: "BR16", t: "L16 Wallet+pack caps", s: "met" },
    { id: "CK01", t: "CI gate green (merged)", s: "met" },
    { id: "CK02", t: "Semgrep gate un-broken + hardened", s: "met" },
    { id: "CK03", t: "Grype critical=0", s: "met" },
    { id: "CK04", t: "RBAC server-side", s: "met" },
    { id: "CK05", t: "No PAN/secret stored/logged", s: "met" },
    { id: "CK06", t: "Append-only enforced (UPDATE/DELETE/TRUNCATE triggers live)", s: "met" },
    { id: "CK07", t: "tests/db refuse prod host unless FAVO_DB_TEST_OK=1 (B2, R6)", s: "met" }
  ],
  survived: [
    "Loyalty earn is exactly-once across ALL THREE confirmation sites (webhook + deferred cron + manual confirm) — no double-earn (partial unique index + credit-only-on-insert); reversed on cancel/refund, clamped to balance so the >=0 CHECK holds and cached↔ledger agree.",
    "RBAC server-side on all actions + every API route (fail-closed) — re-confirmed unchanged.",
    "No card data / secrets stored or logged; Yoco tokens only; the manual pay path records only THAT an order was paid.",
    "Yoco webhook HMAC verify + timing-safe compare + 401 on invalid — untouched by the earn/refund changes.",
    "Loyalty multi-unit clamp math + mutual-exclusion with staff discount + redeem idempotency; 23514 races now surface as CONFLICT, not 500.",
    "Wallet caps (R1,000/R2,500) + pack 90-day expiry, counter-only.",
    "RLS is ENABLE-not-FORCE + fail-closed → staff/admin/system unaffected; all 6 dashboard tables covered; proven in CI against real Postgres.",
    "audit_log is append-only against UPDATE, DELETE and now TRUNCATE (statement-level guard, migration 0025 — live).",
    "CI merge gate green (typecheck, lint, 905/905 unit, test:db vs real PG); 0 critical dependency CVEs. PR #208 merged."
  ],
  carry: [
    "HUMAN — live+device (irreducibly manual, the saturation residual): SC01 COGS ≤5s, SC05 push ≤10s, SC08 offline 60-min 0-lost drill.",
    "HUMAN — SC02 load test: run the k6 runbook (docs/load-testing-sunday-peak.md), 45 orders/85 min. SC03/04: read p50/p95 from v_order_fulfillment_percentiles once REAL café data exists — today's rows are test/seed and produce degenerate percentiles (view is correct, data isn't representative).",
    "HUMAN — rotate the live Supabase DB password: it was pasted into a session transcript during graduation.",
    "Deliberately NOT bundled (flagged): vitest global YOCO_SECRET_KEY=\"\" hides the AT-122 gate from unit tests — a proper fix is a broad per-test refactor.",
    "Non-gating leftovers: N7 closeDaily hard-block, N8 emergency-purchase pending flow, N9 bump drizzle-orm ≥0.45.2, N10 webhook replay-window, pack category/T&Cs.",
    "Wallet-debit-for-order earn (L06 clause) still has no feature to hook — not invented; flag if that payment path is ever added.",
    "#208 was stacked on #206 — merging carried #206's content incl. an unfixed forgot-password res.ok bug (tracked separately)."
  ],
  effort: [ { n: 9, k: "rounds (0–8)" }, { n: 9, k: "adversaries run" }, { n: 22, k: "findings fixed" }, { n: 909, k: "unit tests green (main)" }, { n: 6, k: "migrations authored" } ]
};
const RUN = RUN_INLINE || (typeof RUN_DATA !== "undefined" ? RUN_DATA : null);
/* ==================================================================================== */

const $=s=>document.querySelector(s);
const reduce=matchMedia("(prefers-reduced-motion: reduce)").matches;

/* live mode: this file is regenerated at each round boundary; until the run reaches a
   terminal state the page re-reads itself so an open tab tracks the run with no watcher */
const TERMINAL=["converged","saturated","budget_cap","graduated","stopped"];
const live = !RUN || !TERMINAL.includes(RUN.status);
if(live) setTimeout(()=>location.reload(), 30000);

if(!RUN || !RUN.rounds || !RUN.rounds.length){
  $("#root").innerHTML='<div class="panel emptywrap"><span class="pulse"></span><h1>Refine Loop</h1><p class="sub">Waiting for the run’s first log entry — this page refreshes itself. Leave it open.</p></div>';
} else { render(RUN); }

function render(RUN){
  const STATUS_TIP={
    converged:"<b>Converged</b> — an independent checker could no longer find any real problems.",
    saturated:"<b>Saturated</b> — the evidence has given all it can; what remains needs one human act (a measurement, a source, a decision) named in the log.",
    budget_cap:"<b>Budget cap</b> — stopped at the round limit; leftover gaps handed to a human.",
    graduated:"<b>Graduated</b> — finished and signed off by a human."};
  const statusCls = (RUN.status==="converged"||RUN.status==="graduated") ? "" :
                    (RUN.status==="saturated"||RUN.status==="budget_cap") ? "human" : "active";

  /* budget chip — round <used> of <max>, warm when >= 75% spent */
  let budgetChip="";
  if(RUN.budget && typeof RUN.budget.max_rounds==="number"){
    const bmaxr=RUN.budget.max_rounds;
    const bused=typeof RUN.budget.used==="number"?RUN.budget.used:Math.max(0,...RUN.rounds.map(r=>r.n||0));
    const bcls=(bused/bmaxr>=0.75)?"active":"quiet";
    budgetChip=`<span class="badge ${bcls}" data-tip="The run's hard stop — it may not loop forever."><span class="dot"></span>round ${bused} of ${bmaxr}</span>`;
  }

  /* outcome / next-action hero — only when the log supplies outcome or next */
  let hero="";
  if(RUN.outcome || RUN.next){
    const done=(RUN.status==="converged"||RUN.status==="graduated");
    const handed=(RUN.status==="saturated"||RUN.status==="budget_cap");
    const tone=done?"done":handed?"human":"loop";
    const act=RUN.next&&RUN.next.act?esc(RUN.next.act):"";
    let nextLine;
    if(handed)      nextLine=`<span class="who">now needed from you</span><span class="act">${act||"review the residual named in the log."}</span>`;
    else if(done)   nextLine=`<span class="who">now needed</span><span class="act">${act||"Review and bless it."}</span>`;
    else            nextLine=`<span class="who">loop</span><span>Nothing needed from you — the loop is working.${act?` <span class="act">Next: ${act}</span>`:""}</span>`;
    hero=`
      <section class="panel col-12 outcome ${tone}">
        <h2>Outcome &amp; what’s next <button class="info" data-tip="What this run has produced so far, in plain language — and whether the next move belongs to the <b>loop</b> or to <b>you</b>." aria-label="explain">i</button></h2>
        ${RUN.outcome?`<div class="o-kick">${done||handed?"outcome":"outcome so far"}</div><div class="o-head">${esc(RUN.outcome.headline)}</div>${RUN.outcome.detail?`<p class="o-detail">${esc(RUN.outcome.detail)}</p>`:""}`:""}
        <div class="o-next">${nextLine}</div>
      </section>`;
  }

  const root=$("#root");
  root.innerHTML=`
    <header>
      <div>
        <h1>Refine Loop — ${esc(RUN.title||"run")}</h1>
        <p class="sub">${esc(RUN.subtitle||"a generate → critique → converge run")}</p>
        <p class="helphint">Hover or tap any <span style="border:1px solid var(--line);border-radius:50%;padding:0 4px;font-size:10px;color:var(--dim)">i</span> or dotted term for a plain-English explainer.</p>
      </div>
      <div class="badges">
        <span class="badge ${statusCls}" data-tip="${STATUS_TIP[RUN.status]||'<b>In progress</b> — the loop is still finding and fixing problems. This page refreshes itself while the run is live.'}"><span class="dot"></span>${(RUN.status||'in progress').replace(/_/g,' ').toUpperCase()}</span>
        ${budgetChip}
        ${RUN.human_blessed?'<span class="badge human" data-tip="<b>Human-blessed</b> — a person signed off on stopping here."><span class="dot"></span>human-blessed</span>':''}
      </div>
    </header>
    <div class="grid">
      ${hero}
      <section class="panel col-8">
        <h2>Falsification pressure <button class="info" data-tip="How many real problems an independent reviewer could still find, each time we checked. We want this to reach <b>zero</b>. Falling bars = the work got harder to fault." aria-label="explain">i</button></h2>
        <div class="hero">
          <div><div class="bignum" id="bignum"></div><div class="trail" id="trail"></div></div>
          <div class="label">Blocking problems a <span class="term" data-tip="A reviewer brought in only to <b>attack</b> the work and try to prove it isn't done — not to approve it. '<b>Fresh</b>' = a new one each round, so it can't get attached to earlier answers.">fresh adversary</span> could land, per review round. The job: drive it to zero, and have a fresh critic confirm it.</div>
        </div>
        <div style="margin-top:18px"><svg id="burndown" viewBox="0 0 680 240" role="img" aria-label="Blocking problems per review, falling toward zero."></svg></div>
      </section>
      <section class="panel col-4">
        <h2>Spec growth <button class="info" data-tip="The list of standards the work must meet. It's allowed to <b>grow</b> as we learn — a rule the reviewer discovers mid-run gets added. Growing is good: a gap caught before 'done'." aria-label="explain">i</button></h2>
        <p class="sub" style="margin-bottom:12px;font-size:13px">Rules in force, over the run.</p>
        <svg id="growth" viewBox="0 0 300 180" role="img" aria-label="Number of rules over the run."></svg>
      </section>
      <section class="panel col-6">
        <h2>Rounds <button class="info" data-tip="Each pass of the loop. A round <b>builds</b> something, <b>attacks</b> it to find flaws, or <b>checks</b> whether it's finished. Hover a coloured tag for what it means." aria-label="explain">i</button></h2>
        <div id="timeline"></div>
      </section>
      <div class="col-6" style="display:grid;gap:16px;align-content:start">
        <section class="panel">
          <h2>The spec <button class="info" data-tip="The standards this work had to meet to count as done. '<b>Met</b>' = satisfied. '<b>Grew mid-run</b>' = the checking process revealed this rule was needed." aria-label="explain">i</button></h2>
          <div class="scrollx"><table><thead><tr><th>id</th><th>rule</th><th>status</th></tr></thead><tbody id="rules"></tbody></table></div>
        </section>
        <section class="panel">
          <h2>What survived the attack <button class="info" data-tip="Things the reviewer tried hard to break and <b>couldn't</b> — the parts we're now confident in, by attack not assumption." aria-label="explain">i</button></h2>
          <ul class="clean" id="survived"></ul>
        </section>
        <section class="panel">
          <h2>Open carry-forward <button class="info" data-tip="Loose ends. Done enough to stop, but noted to handle later so nothing slips through the cracks." aria-label="explain">i</button></h2>
          <ul class="clean" id="carry"></ul>
        </section>
      </div>
      <section class="panel col-12">
        <h2>Effort <button class="info" data-tip="How much work the run took. If time/cost wasn't tracked, we show the work done rather than invent a number." aria-label="explain">i</button></h2>
        <div class="effort" id="effort"></div>
        <p class="note" id="costnote"></p>
      </section>
    </div>
    <footer><span class="src">pure render of LOOP.md · regenerated each round${live?' · auto-refreshes while the run is live':''}</span><span>${esc(RUN.stamp||"")}</span></footer>`;

  /* derive burndown from adversarial rounds + a trailing zero at converge */
  const adv = RUN.rounds.filter(r=>typeof r.blocking==="number");
  const burndown = adv.map(r=>({r: r.kind&&r.kind.includes("converge")?"final":("R"+r.n), v:r.blocking}));
  if(RUN.status==="converged" && burndown.length && !burndown.some(b=>b.v===0)) burndown.push({r:"final",v:0});
  const bmax = Math.max(8, ...burndown.map(b=>b.v));
  const last = burndown.length?burndown[burndown.length-1].v:null;
  $("#bignum").textContent = last===null?"—":last;
  $("#bignum").style.color = last===0?"var(--zero)":last<2?"var(--cool)":last<5?"var(--warm)":"var(--hot)";
  $("#trail").innerHTML = "blocking · trail: " + burndown.map(b=>`<b>${b.v}</b>`).join(" → ");

  drawBurndown(burndown,bmax);
  drawGrowth(RUN);

  /* timeline */
  const KIND_TIP={
    setup:"<b>Setup</b> — the folder, the goal, the ground rules.",
    understand:"<b>Understand</b> — research and reading before building.",
    spec:"<b>Spec</b> — writing down exactly what 'good' means.",
    build:"<b>Build</b> — making the thing, or fixing what a review found.",
    adversarial:"<b>Adversarial</b> — a fresh reviewer tries hard to break it.",
    verify:"<b>Verify</b> — re-checking that a fix actually holds.",
    converge:"<b>Converge</b> — checking it's truly finished (no problems left).",
    graduate:"<b>Graduate</b> — a human signs off on stopping.",
    deploy:"<b>Deploy</b> — shipped / put live.",
    triage:"<b>Triage</b> — inventorying what needs doing (e.g. all the files to migrate).",
    replay:"<b>Replay</b> — re-running a known case to learn from it."};
  $("#timeline").innerHTML = RUN.rounds.map(r=>{
    const chips=(r.kind||[]).map(k=>{
      const cls=k==="adversarial"?"adv":k==="build"?"build":k==="converge"?"converge":(k==="graduate"||k==="deploy")?"graduate":"";
      return `<span class="kind ${cls}" data-tip="${KIND_TIP[k]||esc(k)}">${esc(k)}</span>`;}).join("");
    const res=r.res?` <span class="res">— ${esc(r.res)}</span>`:"";
    return `<div class="round"><div class="rnum">R${r.n}</div><div class="rbody"><div class="kinds">${chips}</div><div class="rtext">${esc(r.text||"")}${res}</div></div></div>`;
  }).join("");

  $("#rules").innerHTML = (RUN.rules||[]).map(r=>
    `<tr><td>${esc(r.id)}</td><td>${esc(r.t)}</td><td><span class="st ${r.s==='grown'?'grown':r.s==='open'?'open':'met'}">${r.s==='grown'?'grew mid-run':r.s==='open'?'open':'met'}</span></td></tr>`).join("");
  $("#survived").innerHTML = (RUN.survived||[]).map(t=>`<li class="pass">${t}</li>`).join("") || '<li class="pass" style="color:var(--dim)">—</li>';
  $("#carry").innerHTML = (RUN.carry||[]).map(t=>`<li class="carry">${t}</li>`).join("") || '<li class="carry" style="color:var(--dim)">none</li>';
  $("#effort").innerHTML = (RUN.effort||[]).map(e=>`<div><div class="n">${esc(e.n)}</div><div class="k">${esc(e.k)}</div></div>`).join("");
  $("#costnote").textContent = RUN.costnote || "Cost not tracked — showing effort, not spend.";

  initTips();
}

function drawBurndown(data,max){
  const W=680,H=240,padL=40,padB=42,padT=14,padR=14,n=data.length||1;
  const iw=W-padL-padR,ih=H-padT-padB,gap=iw/n,bw=gap*0.52;
  const y=v=>padT+ih-(v/max)*ih;
  const col=v=>v>=Math.ceil(max*0.6)?"var(--hot)":v>=2?"var(--warm)":v>0?"var(--cool)":"var(--zero)";
  const ticks=[0,Math.round(max/4),Math.round(max/2),Math.round(max*3/4),max].filter((v,i,a)=>a.indexOf(v)===i);
  let s=`<line class="axis" x1="${padL}" y1="${padT}" x2="${padL}" y2="${padT+ih}"/><line class="axis" x1="${padL}" y1="${padT+ih}" x2="${W-padR}" y2="${padT+ih}"/>`;
  ticks.forEach(t=>{const yy=y(t);s+=`<line class="gridline" x1="${padL}" y1="${yy}" x2="${W-padR}" y2="${yy}"/><text class="tick" x="${padL-8}" y="${yy+4}" text-anchor="end">${t}</text>`;});
  data.forEach((d,i)=>{const cx=padL+gap*i+gap/2,bx=cx-bw/2,by=y(d.v),bh=padT+ih-by;
    s+=`<rect x="${bx}" y="${reduce?by:padT+ih}" width="${bw}" height="${reduce?bh:0}" rx="4" fill="${col(d.v)}">`;
    if(!reduce)s+=`<animate attributeName="y" from="${padT+ih}" to="${by}" dur="0.6s" begin="${i*0.12}s" fill="freeze" calcMode="spline" keySplines="0.2 0 0 1"/><animate attributeName="height" from="0" to="${bh}" dur="0.6s" begin="${i*0.12}s" fill="freeze" calcMode="spline" keySplines="0.2 0 0 1"/>`;
    s+=`</rect><text class="barlbl" x="${cx}" y="${by-8}" text-anchor="middle">${d.v}</text><text class="barcap" x="${cx}" y="${padT+ih+18}" text-anchor="middle">${esc(d.r)}</text>`;});
  $("#burndown").innerHTML=s;
}

function drawGrowth(RUN){
  const rules=RUN.rules||[];
  const maxR=Math.max(1,...RUN.rounds.map(r=>r.n));
  const total=rules.length||1;
  // cumulative rules with .added <= round; if no .added, treat all as present from round 2
  const addedAt=r=>rules.filter(x=>typeof x.added==="number"?x.added<=r:r>=2).length;
  const W=300,H=180,padL=28,padB=28,padT=12,padR=12,iw=W-padL-padR,ih=H-padT-padB;
  const X=v=>padL+(v/maxR)*iw,Y=v=>padT+ih-(v/Math.max(total,1))*ih;
  let s=`<line class="axis" x1="${padL}" y1="${padT}" x2="${padL}" y2="${padT+ih}"/><line class="axis" x1="${padL}" y1="${padT+ih}" x2="${W-padR}" y2="${padT+ih}"/>`;
  /* de-dupe ticks, then drop any tick whose label would sit closer than 14px to one already kept */
  let lastTickY=null;
  [0,Math.round(total/2),total].filter((v,i,a)=>a.indexOf(v)===i)
    .filter(t=>{const yy=Y(t);if(lastTickY!==null&&Math.abs(yy-lastTickY)<14)return false;lastTickY=yy;return true;})
    .forEach(t=>{s+=`<text class="tick" x="${padL-6}" y="${Y(t)+4}" text-anchor="end">${t}</text>`;});
  let d="",prev=null;
  for(let r=0;r<=maxR;r++){const v=addedAt(r),x=X(r),yv=Y(v);
    if(r===0)d=`M ${x} ${yv}`; else d+=` L ${X(r-1)} ${yv} L ${x} ${yv}`;
    if(prev!==null && v>prev) s+=`<circle cx="${x}" cy="${yv}" r="3.5" fill="var(--accent)"/>`;
    prev=v;}
  s=`<path d="${d}" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round"/>`+s;
  s+=`<text class="tick" x="${padL}" y="${padT+ih+18}">R0</text><text class="tick" x="${W-padR}" y="${padT+ih+18}" text-anchor="end">R${maxR}</text>`;
  $("#growth").innerHTML=s;
}

function esc(t){return String(t==null?"":t).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

function initTips(){
  const tip=$("#tooltip");let pinned=null;
  function show(el){const txt=el.getAttribute("data-tip");if(!txt)return;
    tip.innerHTML=txt;tip.classList.add("show");
    const r=el.getBoundingClientRect(),tw=tip.offsetWidth,th=tip.offsetHeight,m=10;
    let left=Math.max(m,Math.min(r.left+r.width/2-tw/2,innerWidth-tw-m));
    let top=r.top-th-8; if(top<m)top=r.bottom+8;
    tip.style.left=left+"px";tip.style.top=top+"px";}
  function hide(){tip.classList.remove("show");pinned=null;}
  document.querySelectorAll("[data-tip]").forEach(el=>{
    if(el.tagName!=="BUTTON")el.setAttribute("tabindex","0");
    el.addEventListener("mouseenter",()=>show(el));
    el.addEventListener("mouseleave",()=>{if(pinned!==el)hide();});
    el.addEventListener("focus",()=>show(el));el.addEventListener("blur",hide);
    el.addEventListener("click",e=>{e.preventDefault();if(pinned===el)hide();else{show(el);pinned=el;}});});
  addEventListener("scroll",hide,{passive:true});
  addEventListener("keydown",e=>{if(e.key==="Escape")hide();});
  document.addEventListener("click",e=>{if(pinned&&!e.target.closest("[data-tip]"))hide();});
}
</script>
</body>
</html>
